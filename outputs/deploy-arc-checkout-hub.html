<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deploy Arc Checkout Hub</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #fff;
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee9;
      --accent: #0757f9;
      --ok: #087443;
      --bad: #b42318;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, rgba(7, 87, 249, .08), transparent 42%), var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(860px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0; }
    header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 40px); letter-spacing: 0; }
    p { color: var(--muted); }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); padding: 22px; }
    .status { padding: 11px 12px; border: 1px solid var(--line); border-radius: 7px; background: #f8fafc; color: var(--muted); font-size: 13px; }
    label { display: block; margin: 16px 0 7px; color: #344054; font-size: 13px; font-weight: 700; }
    input { width: 100%; border: 1px solid #cbd3df; border-radius: 6px; padding: 12px 13px; font: inherit; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    button, a.button {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 42px; border: 1px solid transparent; border-radius: 6px; padding: 0 15px;
      background: var(--accent); color: #fff; font: inherit; font-weight: 750; cursor: pointer; text-decoration: none;
    }
    .secondary { background: #fff; color: var(--ink); border-color: #cbd3df; }
    .result, .error { display: none; margin-top: 16px; border-radius: 7px; padding: 13px; overflow-wrap: anywhere; font-size: 13px; }
    .result { border: 1px solid #abefc6; background: #ecfdf3; color: var(--ok); }
    .error { border: 1px solid #fecdca; background: #fef3f2; color: var(--bad); }
    a { color: inherit; font-weight: 800; }
    @media (max-width: 720px) { header, .grid { grid-template-columns: 1fr; flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Deploy Arc Checkout Hub</h1>
        <p>One shared payment contract for multiple merchants. You only sign deploy in MetaMask.</p>
      </div>
      <button id="connectBtn" type="button">Connect wallet</button>
    </header>

    <section class="panel">
      <div class="status" id="status">Wallet not connected</div>
      <div class="grid">
        <div>
          <label for="usdc">USDC contract</label>
          <input id="usdc" value="0x3600000000000000000000000000000000000000">
        </div>
        <div>
          <label for="projectSlug">Project slug</label>
          <input id="projectSlug" value="bcth-arc-checkout-hub">
        </div>
      </div>
      <div class="actions">
        <button id="deployBtn" type="button">Deploy hub</button>
        <button class="secondary" id="switchBtn" type="button">Switch Arc Testnet</button>
        <a class="button secondary" href="./arc-usdc-checkout.html?admin=1">Open invoice builder</a>
      </div>
      <div class="result" id="result"></div>
      <div class="error" id="error"></div>
    </section>
  </main>

  <script>
    const ARC_CHAIN_ID_HEX = "0x4cef52";
    const ARC_RPC = "https://rpc.testnet.arc.network";
    const ARC_EXPLORER = "https://testnet.arcscan.app";
    const els = {
      connectBtn: document.querySelector("#connectBtn"),
      switchBtn: document.querySelector("#switchBtn"),
      deployBtn: document.querySelector("#deployBtn"),
      status: document.querySelector("#status"),
      usdc: document.querySelector("#usdc"),
      projectSlug: document.querySelector("#projectSlug"),
      result: document.querySelector("#result"),
      error: document.querySelector("#error")
    };
    let account = "";
    let chainId = "";

    function shortAddress(address) { return address ? `${address.slice(0, 6)}...${address.slice(-4)}` : ""; }
    function isValidAddress(address) { return /^0x[a-fA-F0-9]{40}$/.test(address); }
    function setError(message) { els.error.style.display = message ? "block" : "none"; els.error.textContent = message || ""; }
    function setResult(html) { els.result.style.display = html ? "block" : "none"; els.result.innerHTML = html || ""; }
    function updateStatus() {
      const network = chainId.toLowerCase() === ARC_CHAIN_ID_HEX ? "Arc Testnet" : (chainId || "Unknown chain");
      els.status.textContent = account ? `Connected: ${shortAddress(account)} on ${network}` : "Wallet not connected";
      els.connectBtn.textContent = account ? `Disconnect ${shortAddress(account)}` : "Connect wallet";
      els.connectBtn.classList.toggle("secondary", Boolean(account));
    }
    function requireWallet() {
      if (!window.ethereum) throw new Error("Open this page in Chrome with MetaMask or Rabby enabled.");
      return window.ethereum;
    }
    async function refreshWalletState() {
      const provider = requireWallet();
      const accounts = await provider.request({ method: "eth_accounts" });
      account = accounts[0] || "";
      chainId = await provider.request({ method: "eth_chainId" });
      updateStatus();
    }
    async function connectWallet() {
      setError("");
      const provider = requireWallet();
      const accounts = await provider.request({ method: "eth_requestAccounts" });
      account = accounts[0] || "";
      chainId = await provider.request({ method: "eth_chainId" });
      updateStatus();
    }
    async function disconnectWallet() {
      setError("");
      try {
        const provider = requireWallet();
        await provider.request({
          method: "wallet_revokePermissions",
          params: [{ eth_accounts: {} }]
        });
      } catch (error) {
        // Some wallets do not support permission revocation from dApps.
      } finally {
        account = "";
        updateStatus();
      }
    }
    async function toggleWalletConnection() {
      if (account) {
        await disconnectWallet();
      } else {
        await connectWallet();
      }
    }
    async function switchToArc() {
      setError("");
      const provider = requireWallet();
      try {
        await provider.request({ method: "wallet_switchEthereumChain", params: [{ chainId: ARC_CHAIN_ID_HEX }] });
      } catch (error) {
        if (error.code !== 4902) throw error;
        await provider.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: ARC_CHAIN_ID_HEX,
            chainName: "Arc Network Testnet",
            nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
            rpcUrls: [ARC_RPC],
            blockExplorerUrls: [ARC_EXPLORER]
          }]
        });
      }
      await refreshWalletState();
    }
    function utf8ToHex(value) {
      return Array.from(new TextEncoder().encode(value)).map((byte) => byte.toString(16).padStart(2, "0")).join("");
    }
    function encodeUint(value) { return BigInt(value).toString(16).padStart(64, "0"); }
    function encodeAddress(address) { return address.toLowerCase().replace("0x", "").padStart(64, "0"); }
    function encodeDynamicString(value) {
      const hex = utf8ToHex(value);
      const byteLength = hex.length / 2;
      const paddedLength = Math.ceil(hex.length / 64) * 64;
      return encodeUint(byteLength) + hex.padEnd(paddedLength, "0");
    }
    function encodeConstructor(usdc, projectSlug) {
      const slugData = encodeDynamicString(projectSlug);
      return encodeAddress(usdc) + encodeUint(64) + slugData;
    }
    async function waitForReceipt(txHash) {
      const provider = requireWallet();
      for (let i = 0; i < 80; i += 1) {
        const receipt = await provider.request({ method: "eth_getTransactionReceipt", params: [txHash] });
        if (receipt) return receipt;
        await new Promise((resolve) => setTimeout(resolve, 1200));
      }
      throw new Error("Receipt not available yet. Check ArcScan with the tx hash.");
    }
    async function deploy() {
      setError("");
      setResult("");
      try {
        if (!account) await connectWallet();
        if (chainId.toLowerCase() !== ARC_CHAIN_ID_HEX) await switchToArc();
        const usdc = els.usdc.value.trim();
        const projectSlug = els.projectSlug.value.trim();
        if (!isValidAddress(usdc)) throw new Error("USDC contract must be a valid address.");
        if (!projectSlug) throw new Error("Project slug is required.");
        els.deployBtn.disabled = true;
        els.deployBtn.textContent = "Confirm deploy";
        const provider = requireWallet();
        const artifact = await fetch("./ArcCheckoutHub.artifact.json").then((response) => response.json());
        const txHash = await provider.request({
          method: "eth_sendTransaction",
          params: [{
            from: account,
            data: artifact.bytecode + encodeConstructor(usdc, projectSlug),
            maxFeePerGas: "0x4a817c800",
            maxPriorityFeePerGas: "0x0"
          }]
        });
        setResult(`Deploy submitted. <a href="${ARC_EXPLORER}/tx/${txHash}" target="_blank" rel="noreferrer">View tx</a>`);
        els.deployBtn.textContent = "Waiting receipt";
        const receipt = await waitForReceipt(txHash);
        if (receipt.status !== "0x1") throw new Error("Deploy reverted.");
        localStorage.setItem("arcCheckoutHub", receipt.contractAddress);
        setResult(`
          Hub deployed: <strong>${receipt.contractAddress}</strong><br>
          This contract can route payments to many merchants.<br>
          <a href="${ARC_EXPLORER}/address/${receipt.contractAddress}" target="_blank" rel="noreferrer">View hub</a>
          &nbsp;|&nbsp;
          <a href="./arc-usdc-checkout.html?admin=1">Open invoice builder</a>
        `);
      } catch (error) {
        setError(error.message || "Deploy failed.");
      } finally {
        els.deployBtn.disabled = false;
        els.deployBtn.textContent = "Deploy hub";
      }
    }
    els.connectBtn.addEventListener("click", () => toggleWalletConnection().catch((error) => setError(error.message)));
    els.switchBtn.addEventListener("click", () => switchToArc().catch((error) => setError(error.message)));
    els.deployBtn.addEventListener("click", deploy);
    if (window.ethereum) {
      window.ethereum.on?.("accountsChanged", (accounts) => { account = accounts[0] || ""; updateStatus(); });
      window.ethereum.on?.("chainChanged", (nextChainId) => { chainId = nextChainId; updateStatus(); });
      refreshWalletState().catch(() => updateStatus());
    } else {
      updateStatus();
    }
  </script>
</body>
</html>
